<!doctype html>
<html lang="zh-Hant">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Spring Boot 靜態頁面測試</title>
	<style>
		body {
			margin: 0;
			font-family: Arial, sans-serif;
			background: #f7f9fc;
			color: #1f2937;
		}

		.container {
			max-width: 760px;
			margin: 64px auto;
			background: #ffffff;
			border: 1px solid #e5e7eb;
			border-radius: 12px;
			padding: 28px;
			box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
		}

		h1 {
			margin-top: 0;
			font-size: 28px;
		}

		p {
			line-height: 1.7;
		}

		.photos {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
			gap: 12px;
			margin-top: 18px;
		}

		.photos img {
			width: 100%;
			height: 180px;
			object-fit: cover;
			border-radius: 10px;
			border: 1px solid #e5e7eb;
		}

		.ok {
			display: inline-block;
			margin-top: 12px;
			background: #10b981;
			color: #fff;
			padding: 8px 14px;
			border-radius: 999px;
			font-weight: bold;
			font-size: 14px;
		}
	</style>
</head>
<body>
	<main class="container">
		<h1>test.html 生成成功</h1>
		<p>如果你能看到這個頁面，表示 Spring Boot 專案中的靜態資源已可正常讀取。</p>
		<section class="photos">
			<img src="/imgs/image1.jpg" alt="照片 1" />
			<img src="/imgs/image2.jpg" alt="照片 2" />
		</section>
		<p class="ok">✅ Static File Works</p>
	</main>
</body>
</html>
