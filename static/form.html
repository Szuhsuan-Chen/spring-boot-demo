<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form表單</title>
</head>
<body>
    <h3>加法的功能-GET</h3>
    <form action="/add">
        <input type="text" name="n1" placeholder="輸入第一個數字">
        <input type="text" name="n2" placeholder="輸入第二個數字">
        <button type="submit">計算</button>
    </form>
    <h3>加法的功能-POST</h3>
    <form action="/add" method="post">
        <input type="text" name="n1" placeholder="輸入第一個數字">
        <input type="text" name="n2" placeholder="輸入第二個數字">
        <button type="submit">計算</button>
    </form>
</body>
</html>
